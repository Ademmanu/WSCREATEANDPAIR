name: WhatsApp Registration

on:
  workflow_dispatch:
    inputs:
      phone_number:
        description: 'Phone number to register'
        required: true
        type: string
      telegram_user_id:
        description: 'Telegram user ID for callbacks'
        required: true
        type: string
      webhook_url:
        description: 'Bot webhook base URL'
        required: true
        type: string
      webhook_secret:
        description: 'Shared secret for webhook auth'
        required: true
        type: string

jobs:
  register:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable KVM access
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -la /dev/kvm

      - name: Install ADB + emulator tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            adb android-tools-adb curl jq wget unzip

      - name: Install Node dependencies
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
        run: npm install --omit=dev

      - name: Download WhatsApp x86 APK
        run: |
          echo "[APK] Downloading WhatsApp x86 APK for emulator..."

          # WhatsApp publishes a universal APK and separate arch-specific ones.
          # For x86_64 emulators we need the x86 or x86_64 variant.
          # APKPure serves the universal ARM APK by default — we must request x86.

          # Try APKPure x86 variant
          wget -q \
            "https://d.apkpure.net/b/APK/com.whatsapp?versionCode=latest&nc=arm64-v8a%2Cx86" \
            -O /tmp/whatsapp.apk \
            --user-agent="Mozilla/5.0 (Linux; Android 9; x86_64 Build/PSR1.180720.117) AppleWebKit/537.36" \
            --timeout=120 \
            || true

          APK_SIZE=$(stat -c%s /tmp/whatsapp.apk 2>/dev/null || echo 0)
          echo "[APK] Attempt 1 size: ${APK_SIZE} bytes"

          # Fallback: download universal APK — will work on google_apis target
          # which includes ARM translation (libhoudini)
          if [ "$APK_SIZE" -lt 10000000 ]; then
            echo "[APK] Trying universal APK..."
            wget -q \
              "https://d.apkpure.net/b/APK/com.whatsapp?version=latest" \
              -O /tmp/whatsapp.apk \
              --user-agent="Mozilla/5.0 (Linux; Android 9; x86_64 Build/PSR1.180720.117) AppleWebKit/537.36" \
              --timeout=120 \
              || true
            APK_SIZE=$(stat -c%s /tmp/whatsapp.apk 2>/dev/null || echo 0)
            echo "[APK] Attempt 2 size: ${APK_SIZE} bytes"
          fi

          if [ "$APK_SIZE" -lt 10000000 ]; then
            echo "[APK] ERROR: APK download failed"
            exit 1
          fi

          # Print APK native libs to confirm it has x86 support
          unzip -p /tmp/whatsapp.apk "META-INF/MANIFEST.MF" 2>/dev/null | head -5 || true
          unzip -l /tmp/whatsapp.apk | grep "lib/" | head -20 || true
          echo "[APK] APK ready: ${APK_SIZE} bytes"

      - name: Run registration script
        id: registration
        env:
          PHONE_NUMBER: ${{ inputs.phone_number }}
          TELEGRAM_USER_ID: ${{ inputs.telegram_user_id }}
          WEBHOOK_URL: ${{ inputs.webhook_url }}/webhook/event
          WEBHOOK_SECRET: ${{ inputs.webhook_secret }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
          NODE_PORT: '3001'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          # google_apis target includes ARM translation (libhoudini/libhoudini)
          # which allows ARM APKs to run on x86_64 emulators.
          # This is the same target used by official Android Studio emulators.
          api-level: 29
          target: google_apis
          arch: x86_64
          profile: pixel_4
          avd-name: wa_reg
          emulator-options: >
            -no-window
            -gpu swiftshader
            -no-snapshot
            -noaudio
            -no-boot-anim
            -memory 3072
            -cores 2
          disable-animations: true
          emulator-boot-timeout: 600
          script: node .github/scripts/wa_register.js

      - name: Notify bot — registration failed
        if: failure()
        env:
          WEBHOOK_URL: ${{ inputs.webhook_url }}/webhook/event
          WEBHOOK_SECRET: ${{ inputs.webhook_secret }}
          PHONE_NUMBER: ${{ inputs.phone_number }}
          TELEGRAM_USER_ID: ${{ inputs.telegram_user_id }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          echo "[FAILURE] Registration failed for $PHONE_NUMBER — notifying bot"
          curl -s -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: $WEBHOOK_SECRET" \
            -d "{
              \"event\": \"bad_number\",
              \"phone_number\": \"$PHONE_NUMBER\",
              \"telegram_user_id\": $TELEGRAM_USER_ID,
              \"run_id\": \"$GITHUB_RUN_ID\",
              \"reason\": \"GitHub Actions workflow failed — emulator or script error\"
            }"

      - name: Notify bot — registration cancelled
        if: cancelled()
        env:
          WEBHOOK_URL: ${{ inputs.webhook_url }}/webhook/event
          WEBHOOK_SECRET: ${{ inputs.webhook_secret }}
          PHONE_NUMBER: ${{ inputs.phone_number }}
          TELEGRAM_USER_ID: ${{ inputs.telegram_user_id }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          echo "[CANCELLED] Registration cancelled for $PHONE_NUMBER — notifying bot"
          curl -s -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: $WEBHOOK_SECRET" \
            -d "{
              \"event\": \"bad_number\",
              \"phone_number\": \"$PHONE_NUMBER\",
              \"telegram_user_id\": $TELEGRAM_USER_ID,
              \"run_id\": \"$GITHUB_RUN_ID\",
              \"reason\": \"GitHub Actions workflow was cancelled\"
            }"
