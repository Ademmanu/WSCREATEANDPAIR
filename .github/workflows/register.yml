name: WhatsApp Registration

on:
  workflow_dispatch:
    inputs:
      phone_number:
        description: 'Phone number'
        required: true
        type: string
      telegram_user_id:
        description: 'Telegram user ID'
        required: true
        type: string
      webhook_url:
        description: 'Webhook URL'
        required: true
        type: string
      webhook_secret:
        description: 'Webhook secret'
        required: true
        type: string

jobs:
  register:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install ADB
        run: sudo apt-get update -qq && sudo apt-get install -y adb

      - name: Run Automation
        env:
          PHONE_NUMBER: ${{ inputs.phone_number }}
          TELEGRAM_USER_ID: ${{ inputs.telegram_user_id }}
          WEBHOOK_URL: ${{ inputs.webhook_url }}/webhook/event
          WEBHOOK_SECRET: ${{ inputs.webhook_secret }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis_playstore
          arch: x86_64
          profile: pixel_4
          emulator-options: -no-window -gpu swiftshader -no-snapshot -noaudio -no-boot-anim -memory 4096
          script: node .github/scripts/wa_register.js

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_id }}
          path: /tmp/vmos_*.png
          if-no-files-found: ignore
