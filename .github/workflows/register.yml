name: WhatsApp Registration

on:
  workflow_dispatch:
    inputs:
      phone_number:
        description: 'Phone number to register'
        required: true
        type: string
      telegram_user_id:
        description: 'Telegram user ID for callbacks'
        required: true
        type: string
      webhook_url:
        description: 'Bot webhook base URL'
        required: true
        type: string
      webhook_secret:
        description: 'Shared secret for webhook auth'
        required: true
        type: string

jobs:
  register:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ADB + emulator tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            adb android-tools-adb curl jq wget unzip

      - name: Install Node dependencies
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
        run: npm install --omit=dev

      - name: Download WhatsApp APK
        run: |
          echo "[APK] Downloading latest WhatsApp APK..."

          wget -q \
            "https://d.apkpure.net/b/APK/com.whatsapp?version=latest" \
            -O /tmp/whatsapp.apk \
            --user-agent="Mozilla/5.0 (Linux; Android 13; Pixel 4) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Mobile Safari/537.36" \
            --timeout=120 \
            || true

          if [ ! -f /tmp/whatsapp.apk ] || [ $(stat -c%s /tmp/whatsapp.apk) -lt 10000000 ]; then
            echo "[APK] Primary source failed, trying fallback..."
            wget -q \
              "https://www.apkmirror.com/apk/whatsapp-inc/whatsapp/" \
              -O /tmp/apkmirror_index.html \
              --user-agent="Mozilla/5.0 (Linux; Android 13) AppleWebKit/537.36" \
              --timeout=30 \
              || true

            APK_PATH=$(grep -oP 'href="\K[^"]*download[^"]*(?=")' /tmp/apkmirror_index.html | head -1 || true)
            if [ -n "$APK_PATH" ]; then
              wget -q "https://www.apkmirror.com${APK_PATH}" \
                -O /tmp/whatsapp.apk \
                --user-agent="Mozilla/5.0 (Linux; Android 13) AppleWebKit/537.36" \
                --timeout=120 \
                || true
            fi
          fi

          APK_SIZE=$(stat -c%s /tmp/whatsapp.apk 2>/dev/null || echo 0)
          echo "[APK] Downloaded file size: ${APK_SIZE} bytes"

          if [ "$APK_SIZE" -lt 10000000 ]; then
            echo "[APK] ERROR: APK download failed or file too small"
            exit 1
          fi

          echo "[APK] WhatsApp APK ready at /tmp/whatsapp.apk (${APK_SIZE} bytes)"

      - name: Run registration script
        id: registration
        env:
          PHONE_NUMBER: ${{ inputs.phone_number }}
          TELEGRAM_USER_ID: ${{ inputs.telegram_user_id }}
          WEBHOOK_URL: ${{ inputs.webhook_url }}/webhook/event
          WEBHOOK_SECRET: ${{ inputs.webhook_secret }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
          NODE_PORT: '3001'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          # API 29 boots in ~90s on GitHub runners vs 5-8min for API 33.
          # WhatsApp supports Android 5.0+ so API 29 works fine.
          # 'default' target has no Google Play overhead — boots faster.
          api-level: 29
          target: default
          arch: x86_64
          profile: pixel_4
          avd-name: wa_reg
          # 'swiftshader' (not swiftshader_indirect) is faster on CI runners.
          # -no-snapshot disables snapshot save/load which hangs on cold runners.
          # -memory 2048 gives the emulator enough RAM to run WhatsApp.
          emulator-options: >
            -no-window
            -gpu swiftshader
            -no-snapshot
            -noaudio
            -no-boot-anim
            -memory 2048
            -cores 2
          disable-animations: true
          # Wait up to 600s (10 min) for boot before failing
          emulator-boot-timeout: 600
          script: node .github/scripts/wa_register.js

      - name: Notify bot — registration failed
        if: failure()
        env:
          WEBHOOK_URL: ${{ inputs.webhook_url }}/webhook/event
          WEBHOOK_SECRET: ${{ inputs.webhook_secret }}
          PHONE_NUMBER: ${{ inputs.phone_number }}
          TELEGRAM_USER_ID: ${{ inputs.telegram_user_id }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          echo "[FAILURE] Registration failed for $PHONE_NUMBER — notifying bot"
          curl -s -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: $WEBHOOK_SECRET" \
            -d "{
              \"event\": \"bad_number\",
              \"phone_number\": \"$PHONE_NUMBER\",
              \"telegram_user_id\": $TELEGRAM_USER_ID,
              \"run_id\": \"$GITHUB_RUN_ID\",
              \"reason\": \"GitHub Actions workflow failed — emulator or script error\"
            }"

      - name: Notify bot — registration cancelled
        if: cancelled()
        env:
          WEBHOOK_URL: ${{ inputs.webhook_url }}/webhook/event
          WEBHOOK_SECRET: ${{ inputs.webhook_secret }}
          PHONE_NUMBER: ${{ inputs.phone_number }}
          TELEGRAM_USER_ID: ${{ inputs.telegram_user_id }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          echo "[CANCELLED] Registration cancelled for $PHONE_NUMBER — notifying bot"
          curl -s -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: $WEBHOOK_SECRET" \
            -d "{
              \"event\": \"bad_number\",
              \"phone_number\": \"$PHONE_NUMBER\",
              \"telegram_user_id\": $TELEGRAM_USER_ID,
              \"run_id\": \"$GITHUB_RUN_ID\",
              \"reason\": \"GitHub Actions workflow was cancelled\"
            }"
