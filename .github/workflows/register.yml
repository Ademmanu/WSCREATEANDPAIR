name: WhatsApp Registration

on:
  workflow_dispatch:
    inputs:
      phone_number:
        description: 'Phone number'
        required: true
        type: string
      telegram_user_id:
        description: 'Telegram user ID'
        required: true
        type: string
      webhook_url:
        description: 'Webhook URL'
        required: true
        type: string
      webhook_secret:
        description: 'Webhook secret'
        required: true
        type: string

jobs:
  register:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -la /dev/kvm

      - name: Install ADB
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends adb

      - name: Download WhatsApp APK from GitHub Release
        run: |
          # Download WhatsApp APK from your repository's GitHub Release
          # 
          # Setup instructions:
          # 1. Upload whatsapp.apk to your repository's Releases
          # 2. Create a release (e.g., "whatsapp-apk-v2.24.20")
          # 3. Attach the whatsapp.apk file to that release
          # 4. Update the URL below with your repository owner and name
          #
          # Format: https://github.com/YOUR_OWNER/YOUR_REPO/releases/download/TAG_NAME/whatsapp.apk
          # Example: https://github.com/johndoe/wa-automation/releases/download/whatsapp-v2.24.20/whatsapp.apk
          
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          APK_TAG="whatsapp"  # Change this to your release tag
          
          WHATSAPP_URL="https://github.com/${REPO_OWNER}/${REPO_NAME}/releases/download/${APK_TAG}/whatsapp.apk"
          
          echo "Downloading WhatsApp APK from: $WHATSAPP_URL"
          curl -L -o /tmp/whatsapp.apk "$WHATSAPP_URL" || {
            echo "❌ Failed to download WhatsApp APK from GitHub Release"
            echo "Please ensure you have:"
            echo "  1. Created a GitHub Release with tag: ${APK_TAG}"
            echo "  2. Uploaded whatsapp.apk to that release"
            echo "  3. Made the release public or ensured the token has access"
            exit 1
          }
          
          # Verify the download
          if [ ! -f /tmp/whatsapp.apk ]; then
            echo "❌ APK file not found after download"
            exit 1
          fi
          
          FILE_SIZE=$(stat -f%z /tmp/whatsapp.apk 2>/dev/null || stat -c%s /tmp/whatsapp.apk 2>/dev/null)
          if [ "$FILE_SIZE" -lt 10000000 ]; then
            echo "⚠️  Warning: APK file size is suspiciously small (${FILE_SIZE} bytes)"
            echo "This might indicate a failed download or incorrect file"
          fi
          
          ls -lh /tmp/whatsapp.apk
          file /tmp/whatsapp.apk
          echo "✓ WhatsApp APK downloaded successfully"

      - name: Run Automation
        env:
          PHONE_NUMBER: ${{ inputs.phone_number }}
          TELEGRAM_USER_ID: ${{ inputs.telegram_user_id }}
          WEBHOOK_URL: ${{ inputs.webhook_url }}/webhook/event
          WEBHOOK_SECRET: ${{ inputs.webhook_secret }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis_playstore
          arch: x86_64
          profile: pixel_6
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          emulator-boot-timeout: 900
          script: |
            # Install WhatsApp APK
            echo "Installing WhatsApp APK..."
            adb install -r /tmp/whatsapp.apk
            
            # Create screenshots directory
            mkdir -p /tmp/screenshots
            
            # Run the registration script
            node .github/scripts/wa_register.js

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_id }}-${{ inputs.phone_number }}
          path: /tmp/screenshots/*.png
          if-no-files-found: ignore

      - name: Notify bot — failure
        if: failure()
        env:
          WEBHOOK_URL: ${{ inputs.webhook_url }}/webhook/event
          WEBHOOK_SECRET: ${{ inputs.webhook_secret }}
          PHONE_NUMBER: ${{ inputs.phone_number }}
          TELEGRAM_USER_ID: ${{ inputs.telegram_user_id }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          curl -s -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: $WEBHOOK_SECRET" \
            -d "{
              \"event\": \"bad_number\",
              \"phone_number\": \"$PHONE_NUMBER\",
              \"telegram_user_id\": $TELEGRAM_USER_ID,
              \"run_id\": \"$GITHUB_RUN_ID\",
              \"reason\": \"WhatsApp registration automation failed - emulator error\"
            }"

      - name: Notify bot — cancelled
        if: cancelled()
        env:
          WEBHOOK_URL: ${{ inputs.webhook_url }}/webhook/event
          WEBHOOK_SECRET: ${{ inputs.webhook_secret }}
          PHONE_NUMBER: ${{ inputs.phone_number }}
          TELEGRAM_USER_ID: ${{ inputs.telegram_user_id }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          curl -s -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: $WEBHOOK_SECRET" \
            -d "{
              \"event\": \"bad_number\",
              \"phone_number\": \"$PHONE_NUMBER\",
              \"telegram_user_id\": $TELEGRAM_USER_ID,
              \"run_id\": \"$GITHUB_RUN_ID\",
              \"reason\": \"Workflow cancelled\"
            }"
